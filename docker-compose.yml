version: "3.7"

services:
  php:
    image: ${APP_NAME}
    build:
      context: ./docker
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/config/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/config/php/docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
      - ./docker/config/vhosts:/etc/apache2/sites-enabled
      - ./docker/config/dir/dir.conf:/etc/apache2/mods-enabled/dir.conf
    networks:
      - app-network
  postgres:
    image: postgres:13.3
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgre:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      - app-network
  rabbitmq:
    image: rabbitmq:3.9.5
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${DATABASE_USER}
      RABBITMQ_DEFAULT_PASS: ${DATABASE_PASSWORD}
    networks:
      - app-network
  node:
    image: node:16
    volumes:
      - .:/var/www/html
    command: sh -c "npm install -g npm && cd /var/www/html && npm install && npm audit fix && npx encore dev --watch"
    networks:
      - app-network
  selenium-hub:
    image: selenium/hub:4.0.0-rc-2-prerelease-20210907
    depends_on:
      - php
    ports:
      - "127.0.0.1:4442:4442"
      - "127.0.0.1:4443:4443"
      - "127.0.0.1:4444:4444"
    networks:
      - app-network
  chrome:
    image: selenium/node-chrome:4.0.0-rc-2-prerelease-20210907
    shm_size: 2gb
    depends_on:
      - selenium-hub
      - php
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    ports:
      - "127.0.0.1:6900:5900"
    networks:
      - app-network
  mailhog:
    image: mailhog/mailhog:v1.0.1
    networks:
      - app-network
    ports:
      - "127.0.0.1:8025:8025"

volumes:
  postgre:
    driver: local

networks:
  app-network:
    driver: bridge