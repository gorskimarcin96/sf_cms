version: "3.7"

services:
  app:
    image: ${APP_NAME}
    build:
      context: ./docker
    container_name: "${APP_NAME}-app"
    restart: always
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/config/php/php.ini:/usr/local/etc/php/php.ini
      - ./docker/config/php/docker-php-ext-xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
      - ./docker/config/vhosts:/etc/apache2/sites-enabled
      - ./docker/config/dir/dir.conf:/etc/apache2/mods-enabled/dir.conf
      - ./docker/logs/apache2:/var/log/apache2
    networks:
      - app-network
  postgres:
    image: postgres:13.3
    container_name: "${APP_NAME}-postgres"
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
      - ./docker/logs/postgres:/var/log/postgresql
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    networks:
      - app-network
  phppgadmin:
    image: neimheadh/phppgadmin:7.13.0
    restart: always
    container_name: "${APP_NAME}-phppgadmin"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASS: ${DATABASE_PASSWORD}
    ports:
      - "127.0.0.1:81:80"
    networks:
      - app-network
  node:
    image: node:15
    restart: always
    container_name: "${APP_NAME}-node"
    volumes:
      - .:/var/www/html
    command: sh -c "npm install -g npm && cd /var/www/html && npm install && npx encore dev"
    networks:
      - app-network
  selenium-hub:
    image: selenium/hub:4.0.0-rc-2-prerelease-20210907
    restart: always
    container_name: "${APP_NAME}-selenium-hub"
    depends_on:
      - app
    ports:
      - "127.0.0.1:4442:4442"
      - "127.0.0.1:4443:4443"
      - "127.0.0.1:4444:4444"
    networks:
      - app-network
  chrome:
    image: selenium/node-chrome:4.0.0-rc-2-prerelease-20210907
    restart: always
    container_name: "${APP_NAME}-chrome"
    shm_size: 2gb
    depends_on:
      - selenium-hub
      - app
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    ports:
      - "127.0.0.1:6900:5900"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge